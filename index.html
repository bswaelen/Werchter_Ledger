<!DOCTYPE html>
<html lang="nl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werchter 2026 Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white antialiased">

    <div id="app" class="max-w-md mx-auto p-4 min-h-screen">
        <header class="text-center py-6">
            <img src="assets/Rock Werchter white logo.png" alt="Werchter Logo" class="mx-auto w-64 sm:w-80 mb-3" />
        </header>

        <main id="member-board" class="space-y-3">
            </main>
        
        <div id="total-pints-counter" class="flex items-center justify-center my-6 text-3xl font-bold text-yellow-400 space-x-3"></div>
        
        <div class="max-w-md mx-auto mb-4 space-y-2">
            <button id="admin-btn" class="w-full bg-gray-700 hover:bg-yellow-400 text-white hover:text-gray-900 font-bold py-3 px-4 rounded-lg transition border-2 border-gray-600 hover:border-yellow-400">
                Admin Beheer
            </button>
            <a href="report25.html" target="_blank" id="report-btn" class="w-full bg-emerald-400 hover:bg-emerald-500 text-emerald-900 font-bold py-3 px-4 rounded-lg transition text-center block">Report '25/'26</a>
        </div>

        <footer class="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 bg-opacity-80 backdrop-blur-sm z-40">
            <div class="max-w-md mx-auto">
                <button id="log-purchase-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-4 px-4 rounded-xl shadow-lg transition-transform transform hover:scale-105">
                    Pinten, graaf! 🍺
                </button>
            </div>
        </footer>

        <div class="h-24"></div>
    </div>

    <div id="admin-password-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm">
            <div class="p-6">
                <h3 class="text-2xl font-bold text-center mb-6">Admin Toegang</h3>
                <div class="mb-6">
                    <label for="admin-password" class="block text-sm font-medium text-gray-400 mb-2">Voer Admin Wachtwoord in</label>
                    <input type="password" id="admin-password" class="w-full bg-gray-700 border-gray-600 text-white rounded-lg p-3 focus:ring-yellow-400 focus:border-yellow-400">
                </div>
            </div>
            <div class="bg-gray-700 px-6 py-4 rounded-b-2xl flex space-x-3">
                <button id="admin-cancel-btn" class="w-full bg-gray-600 text-white font-bold py-3 px-4 rounded-lg">Annuleer</button>
                <button id="admin-confirm-btn" class="w-full bg-yellow-400 text-gray-900 font-bold py-3 px-4 rounded-lg">Inloggen</button>
            </div>
        </div>
    </div>

    <div id="admin-panel-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <h3 class="text-2xl font-bold text-center mb-6">Admin Panel</h3>
                
                <div class="mb-6">
                    <h4 class="text-lg font-semibold mb-3 text-yellow-400">Ledenbeheer</h4>
                    <div id="members-list" class="space-y-2"></div>
                    <button id="add-member-btn" class="mt-3 w-full bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Nieuw Lid Toevoegen</button>
                </div>

                <div>
                    <h4 class="text-lg font-semibold mb-3 text-yellow-400">Recente Loggeschiedenis</h4>
                    <div id="transactions-list" class="space-y-1 max-h-40 overflow-y-auto bg-gray-900 p-2 rounded-lg"></div>
                </div>
            </div>
            <div class="bg-gray-700 px-6 py-4 rounded-b-2xl space-y-2">
                <button id="admin-panel-close-btn" class="w-full bg-gray-600 text-white font-bold py-3 px-4 rounded-lg">Sluiten</button>
                <button id="reset-balances-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg">Reset alle saldi</button>
            </div>
        </div>
    </div>

    <div id="add-member-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm">
            <div class="p-6">
                <h3 class="text-2xl font-bold text-center mb-6">Nieuw Lid Toevoegen</h3>
                <div class="mb-4">
                    <label for="new-member-name" class="block text-sm font-medium text-gray-400 mb-2">Naam</label>
                    <input type="text" id="new-member-name" class="w-full bg-gray-700 border-gray-600 text-white rounded-lg p-3">
                </div>
                <div class="mb-6">
                    <label for="new-member-role" class="block text-sm font-medium text-gray-400 mb-2">Rol</label>
                    <select id="new-member-role" class="w-full bg-gray-700 border-gray-600 text-white rounded-lg p-3">
                        <option value="Core">Core Member</option>
                        <option value="Guest">Guest</option>
                    </select>
                </div>
            </div>
            <div class="bg-gray-700 px-6 py-4 rounded-b-2xl flex space-x-3">
                <button id="add-member-cancel-btn" class="w-full bg-gray-600 text-white font-bold py-3 px-4 rounded-lg">Annuleer</button>
                <button id="add-member-confirm-btn" class="w-full bg-yellow-400 text-gray-900 font-bold py-3 px-4 rounded-lg">Toevoegen</button>
            </div>
        </div>
    </div>

    <div id="purchase-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-gray-800 rounded-2xl shadow-xl w-full max-w-sm">
            <div class="p-6">
                <h3 class="text-2xl font-bold text-center mb-6">Nieuw Rondje / Leeggoed</h3>
                
                <div class="mb-4">
                    <label for="payer" class="block text-sm font-medium text-gray-400 mb-2">Wie haalt/betaalt?</label>
                    <select id="payer" class="w-full bg-gray-700 border-gray-600 text-white rounded-lg p-3"></select>
                </div>
                
                <div class="mb-4">
                    <label for="quantity" class="block text-sm font-medium text-gray-400 mb-2">Aantal bekers (Leeggoed/Consumpties)</label>
                    <select id="quantity" class="w-full bg-gray-700 border-gray-600 text-white rounded-lg p-3 text-center text-lg"></select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Voor wie? (Leeglaten voor enkel leeggoed)</label>
                    <div id="recipients-list" class="modal-content max-h-40 overflow-y-auto space-y-1 p-2 bg-gray-900 rounded-lg"></div>
                </div>
            </div>
            
            <div class="bg-gray-700 px-6 py-4 rounded-b-2xl flex flex-col space-y-2">
                <button id="confirm-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-3 px-4 rounded-lg transition">En gaan! 🚀</button>
                <button id="extra-btn" class="w-full bg-blue-300 hover:bg-blue-400 text-blue-900 font-bold py-3 px-4 rounded-lg transition">Enkel leeggoed 🥤</button>
                <button id="cancel-btn" class="w-full bg-gray-600 text-white font-bold py-2 px-4 rounded-lg transition">Annuleer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, getDocs, doc, deleteDoc, updateDoc, where, query } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAORWEOq8PAVA-GMywLZpl-SqBoPa7KzBI",
            authDomain: "werchter-ledger.firebaseapp.com",
            projectId: "werchter-ledger",
            storageBucket: "werchter-ledger.firebasestorage.app",
            messagingSenderId: "327978781720",
            appId: "1:327978781720:web:ba7774b24426b9aebd476d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.initializeFirebase = async () => ({
            db, collection, onSnapshot, addDoc, getDocs, doc, deleteDoc, updateDoc, where, query
        });
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
